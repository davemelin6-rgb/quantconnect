<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#04080F"/>
      <stop offset="100%" style="stop-color:#080E1C"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22D3EE;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#22D3EE;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="200" cy="200" r="400" fill="url(#glow)" opacity="0.6"/>

  <!-- Grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>

  <!-- Logo mark -->
  <rect x="80" y="220" width="60" height="60" rx="14" fill="rgba(34,211,238,0.15)" stroke="rgba(34,211,238,0.4)" stroke-width="1.5"/>
  <text x="110" y="262" font-family="Arial" font-size="26" font-weight="bold" fill="#22D3EE" text-anchor="middle">CQ</text>

  <!-- Brand name -->
  <text x="160" y="262" font-family="Arial, sans-serif" font-size="38" font-weight="800" fill="#EDF2FF" letter-spacing="-1">
    <tspan fill="#22D3EE">Connect</tspan>Quants
  </text>

  <!-- Tagline -->
  <text x="80" y="330" font-family="Arial, sans-serif" font-size="52" font-weight="800" fill="#EDF2FF" letter-spacing="-2">Talk to a real investor,</text>
  <text x="80" y="395" font-family="Arial, sans-serif" font-size="52" font-weight="800" fill="#22D3EE" letter-spacing="-2">right now.</text>

  <!-- Description -->
  <text x="80" y="450" font-family="Arial, sans-serif" font-size="22" fill="#8A9EC0">Pick a sector · Get matched instantly · Chat live · Free forever</text>

  <!-- Sector pills -->
  <g transform="translate(80, 490)">
    <rect width="80" height="28" rx="14" fill="rgba(34,211,238,0.1)" stroke="rgba(34,211,238,0.3)" stroke-width="1"/>
    <text x="40" y="19" font-family="Arial" font-size="12" font-weight="700" fill="#22D3EE" text-anchor="middle">🧠 AI</text>
  </g>
  <g transform="translate(174, 490)">
    <rect width="110" height="28" rx="14" fill="rgba(139,92,246,0.1)" stroke="rgba(139,92,246,0.3)" stroke-width="1"/>
    <text x="55" y="19" font-family="Arial" font-size="12" font-weight="700" fill="#8B5CF6" text-anchor="middle">⚛️ Quantum</text>
  </g>
  <g transform="translate(298, 490)">
    <rect width="110" height="28" rx="14" fill="rgba(245,158,11,0.1)" stroke="rgba(245,158,11,0.3)" stroke-width="1"/>
    <text x="55" y="19" font-family="Arial" font-size="12" font-weight="700" fill="#F59E0B" text-anchor="middle">🛡️ Defence</text>
  </g>
  <g transform="translate(422, 490)">
    <rect width="100" height="28" rx="14" fill="rgba(16,185,129,0.1)" stroke="rgba(16,185,129,0.3)" stroke-width="1"/>
    <text x="50" y="19" font-family="Arial" font-size="12" font-weight="700" fill="#10B981" text-anchor="middle">🧬 Biotech</text>
  </g>

  <!-- Domain -->
  <text x="1120" y="590" font-family="Arial" font-size="16" fill="#445268" text-anchor="end">connectquants.com</text>
</svg>
